<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>8 de Março</title>
  <link rel="icon" href="assets/favicon.png" type="image/png" />
  <meta name="description" content="Não é homenagem" />
  <meta name="theme-color" content="#0f0d0c">
  
  <!-- fontes do google -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- caminho pro style B) -->
  <link rel="stylesheet" href="main.css">

</head>
<body>

  <!-- video background -->
  <div class="bg-video-wrap">
    <video id="vid-a" class="active" autoplay muted loop playsinline preload="auto" src="assets/bg-default.mp4"></video>
    
    <video id="vid-b" class="inactive" autoplay muted loop playsinline preload="metadata"></video>
  </div>

  <div class="overlay"></div>
  <div class="grain"></div>

  <main class="app" aria-live="polite">

    <section id="s1" class="screen">
      <h1>Não é homenagem.</h1>
      <div class="divider"></div>
      <div class="typewriter" id="t1_1"></div>
      <div class="typewriter text-dim" id="t1_2"></div>
      <div class="actions"><button data-next="s2">Continuar</button></div>
    </section>

    <section id="s2" class="screen">
      <h1><em>Espaço.</em></h1>
      <div class="divider"></div>
      <div class="typewriter" id="t2_1"></div>
      <div class="typewriter" id="t2_2"></div>
      <div class="actions"><button data-next="s3">Continuar</button></div>
    </section>

    <section id="s3" class="screen">
      <h1>O que tentaram<br><em>tirar de você?</em></h1>
      <div class="divider"></div>
      <div class="choice-grid" id="choice_container"></div>
    </section>

    <section id="s4" class="screen">
      <h1 id="res_title">&mdash;</h1>
      <div class="divider"></div>
      <div class="typewriter" id="res_1"></div>
      <div class="typewriter" id="res_2"></div>
      <div class="typewriter text-dim" id="res_3"></div>
      <div class="actions"><button data-next="s5">Continuar</button></div>
    </section>

    <section id="s5" class="screen">
      <h1>Sem romantizar.</h1>
      <div class="divider"></div>
      <div class="typewriter" id="t5_1"></div>
      <div class="typewriter text-dim" id="t5_2"></div>
      <div class="actions"><button id="btn_silence">Finalizar</button></div>
    </section>

    <section id="s6" class="screen">
      <h1 id="final_title">8 de Março.</h1>
      <div class="divider"></div>
      <div class="typewriter" id="final_1"></div>
      <div class="typewriter text-dim" id="final_2"></div>
      
      <span class="final-word" id="final_word"></span>

      <div class="actions" style="margin-top: 40px;">
        <button id="btn_restart">Recomeçar</button>


        <!--
         to testando
        <button class="ghost" id="btn_share" aria-label="Compartilhar">
          ↗ COMPARTILHAR
        </button> -->


      </div>

      <div class="footer" id="final_footer">
        <span>8 de março</span>
        <span id="badge_display"></span>
      </div>
    </section>

    <section id="s7" class="screen">
      <h1 id="secret_title" style="font-size: clamp(24px, 5vw, 36px); font-weight: 400;">—</h1>
      <div class="divider"></div>
      <div class="typewriter" id="secret_1"></div>
      <div class="typewriter text-dim" id="secret_2" style="margin-top: 40px; opacity: 0.7;"></div>
      <div class="actions" style="margin-top: 60px;">
        <button id="btn_restart_secret">Recomeçar</button>
      </div>
    </section>

  </main>

  <div id="silence-overlay">
    <div class="breath-line" id="breath_line"></div>
  </div>

  <footer class="site-credit">
  <div class="credit-main">8 de Março</div>
  <div class="credit-sub">@ 2026 <a href="https://www.instagram.com/engmarcelofontanelli/" target="_blank" rel="noopener">FONTANELLI</a></div>
  <div class="credit-author">by <a href="https://dnyaary.github.io/" target="_blank" rel="noopener">dnyaary</a></div>
</footer>

  <!-- caminho pro js -->
  <script src="main.js"></script>

</body>
</html>
